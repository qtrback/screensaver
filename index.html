<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Screensaver</title>
  <style>
    /* ─── Reset & Layout ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ─── UI Panel ────────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #ui.hidden { opacity: 0; pointer-events: none; }

    .ui-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 8px 14px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    #shape-count {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }

    /* Add-shape button */
    #btn-add {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-add:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.1);
    }

    #btn-add:active { transform: scale(0.96); }

    #btn-remove {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-remove:hover:not(:disabled) {
      background: rgba(255, 80, 80, 0.25);
      border-color: rgba(255, 100, 100, 0.6);
      transform: scale(1.1);
    }
    #btn-remove:active:not(:disabled) { transform: scale(0.96); }
    #btn-remove:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* Intent label toggle */
    #btn-labels {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }

    #btn-labels:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    /* ─── Intent Labels (CSS2DRenderer not used; we use HTML divs) ───────── */
    .intent-label {
      position: fixed;
      pointer-events: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.45);
      border-radius: 6px;
      padding: 2px 6px;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- UI controls -->
<div id="ui">
  <div class="ui-badge" id="shape-count">Shapes: 1</div>
  <button id="btn-labels">labels on</button>
  <button id="btn-remove" title="Remove shape">−</button>
  <button id="btn-add" title="Add shape">+</button>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 1 — INTENT REGISTRY
   ───────────────────────────────────────────────────────────────────────────
   Each entry maps an intent name → a behavior function.

   Signature:  behaviorFn(state, shape, allShapes, bounds, dt)
     state      – per-shape mutable object (velocity, phase, target, …)
     shape      – the Three.js Object3D (mesh + userData)
     allShapes  – array of all active shape objects (for flee/seek other shapes)
     bounds     – { x, y, z } half-extents of the bounding box
     dt         – delta time in seconds

   Adding a new intent = one line: IntentRegistry.register('myIntent', fn)
   ══════════════════════════════════════════════════════════════════════════ */

const IntentRegistry = (() => {
  const _behaviors = new Map();

  /* ── Utility helpers shared across behaviors ─────────────────────────── */
  const EASE = 0.04;          // velocity smoothing factor
  const MAX_SPEED = 1.8;      // world-units / second cap
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  /** Steer velocity gently toward a desired direction (seek-style steering) */
  function steer(vel, desired, factor = EASE) {
    vel.x += (desired.x - vel.x) * factor;
    vel.y += (desired.y - vel.y) * factor;
    vel.z += (desired.z - vel.z) * factor;
    // clamp speed
    const spd = Math.sqrt(vel.x ** 2 + vel.y ** 2 + vel.z ** 2);
    if (spd > MAX_SPEED) {
      const s = MAX_SPEED / spd;
      vel.x *= s; vel.y *= s; vel.z *= s;
    }
  }

  /** Apply velocity to position */
  function integrate(pos, vel, dt) {
    pos.x += vel.x * dt;
    pos.y += vel.y * dt;
    pos.z += vel.z * dt;
  }

  /** Bounce position/velocity off the bounding box walls */
  function bounce(pos, vel, bounds) {
    ['x', 'y', 'z'].forEach(axis => {
      if (pos[axis] > bounds[axis]) {
        pos[axis] = bounds[axis];
        if (vel[axis] > 0) vel[axis] *= -1;
      } else if (pos[axis] < -bounds[axis]) {
        pos[axis] = -bounds[axis];
        if (vel[axis] < 0) vel[axis] *= -1;
      }
    });
  }

  /* ── WANDER ─────────────────────────────────────────────────────────────
     Smooth random movement; changes desired direction every few seconds.    */
  _behaviors.set('wander', (state, shape, _all, bounds, dt) => {
    if (!state.wanderTimer) state.wanderTimer = 0;
    if (!state.desired) state.desired = { x: 0, y: 0, z: 0 };

    state.wanderTimer -= dt;
    if (state.wanderTimer <= 0) {
      // Pick a new random desired velocity
      const angle1 = Math.random() * Math.PI * 2;
      const angle2 = (Math.random() - 0.5) * Math.PI;
      const spd = 0.6 + Math.random() * 1.0;
      state.desired.x = Math.cos(angle1) * Math.cos(angle2) * spd;
      state.desired.y = Math.sin(angle2) * spd;
      state.desired.z = Math.sin(angle1) * Math.cos(angle2) * spd;
      state.wanderTimer = 1.5 + Math.random() * 2.5;
    }

    steer(state.vel, state.desired, 0.03);
    integrate(shape.position, state.vel, dt);
    bounce(shape.position, state.vel, bounds);
  });

  /* ── SEEK ───────────────────────────────────────────────────────────────
     Moves toward the scene center (or toward another shape periodically).   */
  _behaviors.set('seek', (state, shape, allShapes, bounds, dt) => {
    if (!state.seekTimer) state.seekTimer = 0;
    if (!state.target) state.target = { x: 0, y: 0, z: 0 };

    state.seekTimer -= dt;
    if (state.seekTimer <= 0) {
      // Occasionally switch target to another shape
      const candidates = allShapes.filter(s => s !== shape);
      if (candidates.length > 0 && Math.random() < 0.4) {
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        state.target = { x: pick.position.x, y: pick.position.y, z: pick.position.z };
      } else {
        // Seek scene center with slight random offset
        state.target = {
          x: (Math.random() - 0.5) * bounds.x * 0.4,
          y: (Math.random() - 0.5) * bounds.y * 0.4,
          z: (Math.random() - 0.5) * bounds.z * 0.4,
        };
      }
      state.seekTimer = 2.5 + Math.random() * 3;
    }

    // Desired velocity points from current pos toward target
    const dx = state.target.x - shape.position.x;
    const dy = state.target.y - shape.position.y;
    const dz = state.target.z - shape.position.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
    const spd = clamp(dist * 0.5, 0.2, MAX_SPEED);
    const desired = { x: (dx / dist) * spd, y: (dy / dist) * spd, z: (dz / dist) * spd };

    steer(state.vel, desired, 0.05);
    integrate(shape.position, state.vel, dt);
    bounce(shape.position, state.vel, bounds);
  });

  /* ── FLEE ───────────────────────────────────────────────────────────────
     Steers away from the nearest neighbour shape.                           */
  _behaviors.set('flee', (state, shape, allShapes, bounds, dt) => {
    const FEAR_RADIUS = 4.0;
    let fx = 0, fy = 0, fz = 0;

    allShapes.forEach(other => {
      if (other === shape) return;
      const dx = shape.position.x - other.position.x;
      const dy = shape.position.y - other.position.y;
      const dz = shape.position.z - other.position.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.01;
      if (dist < FEAR_RADIUS) {
        // Repulsion strength falls off with distance
        const strength = (FEAR_RADIUS - dist) / FEAR_RADIUS;
        fx += (dx / dist) * strength;
        fy += (dy / dist) * strength;
        fz += (dz / dist) * strength;
      }
    });

    // If no neighbors close by, wander gently
    const mag = Math.sqrt(fx * fx + fy * fy + fz * fz);
    let desired;
    if (mag > 0.01) {
      const spd = clamp(mag * 1.5, 0.3, MAX_SPEED);
      desired = { x: (fx / mag) * spd, y: (fy / mag) * spd, z: (fz / mag) * spd };
    } else {
      if (!state.wanderTimer) state.wanderTimer = 0;
      if (!state.desired) state.desired = { x: 0.3, y: 0.2, z: 0.3 };
      state.wanderTimer -= dt;
      if (state.wanderTimer <= 0) {
        const a = Math.random() * Math.PI * 2;
        state.desired = { x: Math.cos(a) * 0.8, y: (Math.random() - 0.5) * 0.6, z: Math.sin(a) * 0.8 };
        state.wanderTimer = 2 + Math.random() * 2;
      }
      desired = state.desired;
    }

    steer(state.vel, desired, 0.06);
    integrate(shape.position, state.vel, dt);
    bounce(shape.position, state.vel, bounds);
  });

  /* ── ORBIT ──────────────────────────────────────────────────────────────
     Circles around the scene center at a random radius and inclination.     */
  _behaviors.set('orbit', (state, shape, _all, bounds, dt) => {
    if (state.orbitAngle === undefined) {
      state.orbitAngle = Math.random() * Math.PI * 2;
      state.orbitRadius = 1.5 + Math.random() * Math.min(bounds.x, bounds.y) * 0.55;
      state.orbitSpeed  = (0.4 + Math.random() * 0.6) * (Math.random() < 0.5 ? 1 : -1);
      state.orbitTilt   = (Math.random() - 0.5) * Math.PI * 0.6;
      state.orbitBobAmp = Math.random() * 0.8;
      state.orbitBobFreq= 0.5 + Math.random() * 0.5;
    }

    state.orbitAngle += state.orbitSpeed * dt;

    const tx = Math.cos(state.orbitAngle) * state.orbitRadius;
    const ty = Math.sin(state.orbitAngle) * state.orbitRadius * Math.sin(state.orbitTilt)
               + Math.sin(state.orbitAngle * state.orbitBobFreq) * state.orbitBobAmp;
    const tz = Math.sin(state.orbitAngle) * state.orbitRadius * Math.cos(state.orbitTilt);

    // Move position toward the orbit target (smooth follow rather than snap)
    shape.position.x += (tx - shape.position.x) * 0.08;
    shape.position.y += (ty - shape.position.y) * 0.08;
    shape.position.z += (tz - shape.position.z) * 0.08;

    // Update velocity for consistent bounce-avoidance (not strictly needed for orbit
    // but keeps the state consistent if intent switches)
    state.vel.x = (shape.position.x - tx) * -0.1;
    state.vel.y = (shape.position.y - ty) * -0.1;
    state.vel.z = (shape.position.z - tz) * -0.1;
  });

  /* ── IDLE ───────────────────────────────────────────────────────────────
     Gentle floating / bobbing in place with very slow drift.                */
  _behaviors.set('idle', (state, shape, _all, bounds, dt) => {
    if (state.idlePhase === undefined) {
      state.idlePhase = Math.random() * Math.PI * 2;
      state.idleAnchor = {
        x: shape.position.x,
        y: shape.position.y,
        z: shape.position.z,
      };
      state.idleDriftTimer = 0;
      state.idleDriftTarget = { ...state.idleAnchor };
    }

    // Slowly drift the anchor to a new spot every 4–8 s
    state.idleDriftTimer -= dt;
    if (state.idleDriftTimer <= 0) {
      state.idleDriftTarget = {
        x: (Math.random() - 0.5) * bounds.x * 0.9,
        y: (Math.random() - 0.5) * bounds.y * 0.9,
        z: (Math.random() - 0.5) * bounds.z * 0.9,
      };
      state.idleDriftTimer = 4 + Math.random() * 4;
    }

    // Ease anchor toward drift target
    state.idleAnchor.x += (state.idleDriftTarget.x - state.idleAnchor.x) * 0.004;
    state.idleAnchor.y += (state.idleDriftTarget.y - state.idleAnchor.y) * 0.004;
    state.idleAnchor.z += (state.idleDriftTarget.z - state.idleAnchor.z) * 0.004;

    state.idlePhase += dt * 0.8;
    const bob = Math.sin(state.idlePhase) * 0.25;
    const sway= Math.cos(state.idlePhase * 0.7) * 0.15;

    // Move toward (anchor + bob offset) gently
    const tx = state.idleAnchor.x + sway;
    const ty = state.idleAnchor.y + bob;
    const tz = state.idleAnchor.z;

    shape.position.x += (tx - shape.position.x) * 0.02;
    shape.position.y += (ty - shape.position.y) * 0.02;
    shape.position.z += (tz - shape.position.z) * 0.02;
  });

  /* ── PULSE ──────────────────────────────────────────────────────────────
     Extra intent: shape pulses in scale and drifts in a figure-8 pattern.  */
  _behaviors.set('pulse', (state, shape, _all, bounds, dt) => {
    if (state.pulsePhase === undefined) {
      state.pulsePhase = Math.random() * Math.PI * 2;
      state.pulseAnchor = {
        x: (Math.random() - 0.5) * bounds.x * 0.7,
        y: (Math.random() - 0.5) * bounds.y * 0.7,
        z: (Math.random() - 0.5) * bounds.z * 0.5,
      };
      state.pulseSpeed = 0.7 + Math.random() * 0.6;
      state.baseScale  = shape.scale.x;
    }

    state.pulsePhase += dt * state.pulseSpeed;

    // Lissajous-ish figure-8 motion
    const radius = 1.2;
    const tx = state.pulseAnchor.x + Math.sin(state.pulsePhase) * radius;
    const ty = state.pulseAnchor.y + Math.sin(state.pulsePhase * 2) * radius * 0.5;
    const tz = state.pulseAnchor.z + Math.cos(state.pulsePhase) * radius * 0.5;

    shape.position.x += (tx - shape.position.x) * 0.04;
    shape.position.y += (ty - shape.position.y) * 0.04;
    shape.position.z += (tz - shape.position.z) * 0.04;

    // Breathe scale
    const scale = state.baseScale * (1 + Math.sin(state.pulsePhase * 1.5) * 0.18);
    shape.scale.set(scale, scale, scale);
  });

  /* ── CHASE ──────────────────────────────────────────────────────────────
     Extra intent: persistently chases the most-recently-spawned other shape. */
  _behaviors.set('chase', (state, shape, allShapes, bounds, dt) => {
    // Pick a chase target (the last shape in the list that isn't self)
    const others = allShapes.filter(s => s !== shape);
    const target = others.length > 0 ? others[others.length - 1] : null;

    if (!target) {
      // No one to chase — wander
      if (!state.desired) state.desired = { x: 0.5, y: 0.3, z: 0.4 };
      steer(state.vel, state.desired, 0.03);
    } else {
      const dx = target.position.x - shape.position.x;
      const dy = target.position.y - shape.position.y;
      const dz = target.position.z - shape.position.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      // Stop when very close
      const spd = dist > 0.8 ? clamp(dist * 0.4, 0.1, MAX_SPEED * 0.9) : 0;
      const desired = { x: (dx / dist) * spd, y: (dy / dist) * spd, z: (dz / dist) * spd };
      steer(state.vel, desired, 0.07);
    }

    integrate(shape.position, state.vel, dt);
    bounce(shape.position, state.vel, bounds);
  });

  /* FLYING COW
     Extra intent: graceful swooping/gliding flight in a lazy figure-8
     (lemniscate) on X/Z with a gentle sinusoidal up-down glide on Y.
     Slower and floatier than wander/chase/flee -- a bird-like soaring path
     visually distinct from every other registered intent. */
  _behaviors.set('flying cow', (state, shape, _all, bounds, dt) => {
    if (state.cowPhase === undefined) {
      state.cowPhase   = Math.random() * Math.PI * 2;
      state.cowAnchor  = {
        x: (Math.random() - 0.5) * bounds.x * 0.5,
        y: (Math.random() - 0.5) * bounds.y * 0.4,
        z: (Math.random() - 0.5) * bounds.z * 0.4,
      };
      state.cowAmpXZ  = 2.0 + Math.random() * 1.5;
      state.cowAmpY   = 0.8 + Math.random() * 0.6;
      state.cowSpeed  = 0.25 + Math.random() * 0.15; // slow, graceful glide
      state.cowFreqY  = 0.6 + Math.random() * 0.3;
    }

    state.cowPhase += dt * state.cowSpeed;
    const t = state.cowPhase;

    // Lazy figure-8 (lemniscate of Bernoulli) on X/Z; gentle sinusoidal
    // up-down glide on Y -- a soaring, swooping path.
    const denom = 1 + Math.sin(t) * Math.sin(t);
    const tx = state.cowAnchor.x + (state.cowAmpXZ * Math.cos(t)) / denom;
    const tz = state.cowAnchor.z + (state.cowAmpXZ * Math.sin(t) * Math.cos(t)) / denom;
    const ty = state.cowAnchor.y + Math.sin(t * state.cowFreqY) * state.cowAmpY;

    const prevX = shape.position.x, prevY = shape.position.y, prevZ = shape.position.z;

    // Slow, floaty ease toward the swoop target (much gentler than other intents)
    shape.position.x += (tx - shape.position.x) * 0.025;
    shape.position.y += (ty - shape.position.y) * 0.025;
    shape.position.z += (tz - shape.position.z) * 0.025;

    // Track velocity for bounce + consistency if intent switches
    state.vel.x = (shape.position.x - prevX) / dt;
    state.vel.y = (shape.position.y - prevY) / dt;
    state.vel.z = (shape.position.z - prevZ) / dt;

    bounce(shape.position, state.vel, bounds);

    // Bank gently into the glide direction for a convincing soar, and
    // swish the tail if this shape is a cow mesh.
    shape.rotation.z = Math.sin(t) * 0.25;
    if (shape.userData && shape.userData.geoName === 'cow') {
      const tail = shape.getObjectByName('tail');
      if (tail) tail.rotation.x = Math.sin(t * 4) * 0.5;
    }
  });

  /* ── Public API ──────────────────────────────────────────────────────── */
  return {
    /**
     * Register a new intent behavior.
     * @param {string} name - intent identifier
     * @param {Function} fn - behavior function (state, shape, allShapes, bounds, dt) => void
     */
    register(name, fn) {
      _behaviors.set(name, fn);
    },

    /** Execute one frame for the given shape. */
    execute(intentName, state, shape, allShapes, bounds, dt) {
      const fn = _behaviors.get(intentName);
      if (fn) fn(state, shape, allShapes, bounds, dt);
    },

    /** All registered intent names. */
    get names() { return [..._behaviors.keys()]; },
  };
})();


/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 2 — INTENT ENGINE
   ───────────────────────────────────────────────────────────────────────────
   Manages per-shape intent state and delegates each frame to the registry.
   ══════════════════════════════════════════════════════════════════════════ */

class IntentEngine {
  constructor() {
    /**
     * Map<mesh, { intent: string, state: object }>
     * state is a free-form scratchpad each behavior can write to.
     */
    this._entries = new Map();
  }

  /**
   * Register a shape with an intent.
   * @param {THREE.Mesh} mesh
   * @param {string} intent
   */
  assign(mesh, intent) {
    this._entries.set(mesh, {
      intent,
      state: {
        // Pre-seed velocity so every shape starts moving immediately
        vel: {
          x: (Math.random() - 0.5) * 1.0,
          y: (Math.random() - 0.5) * 1.0,
          z: (Math.random() - 0.5) * 1.0,
        },
      },
    });
  }

  /** Remove a shape from the engine. */
  remove(mesh) {
    this._entries.delete(mesh);
  }

  /** Get the current intent name for a mesh. */
  getIntent(mesh) {
    return this._entries.get(mesh)?.intent ?? 'idle';
  }

  /**
   * Tick all registered shapes.
   * @param {THREE.Mesh[]} allShapes  - array of all live meshes
   * @param {{ x, y, z }} bounds     - half-extents
   * @param {number} dt              - delta time in seconds
   */
  update(allShapes, bounds, dt) {
    for (const [mesh, entry] of this._entries) {
      IntentRegistry.execute(entry.intent, entry.state, mesh, allShapes, bounds, dt);

      // Gentle rotation on every shape — speed varies by intent
      const rotSpeed = entry.intent === 'idle' ? 0.3 : entry.intent === 'orbit' ? 0.8 : 0.5;
      mesh.rotation.x += dt * rotSpeed * 0.7;
      mesh.rotation.y += dt * rotSpeed * 1.1;
      mesh.rotation.z += dt * rotSpeed * 0.4;
    }
  }
}


/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 3 — SHAPE FACTORY
   ───────────────────────────────────────────────────────────────────────────
   Geometry registry: adding a new shape type = one registration line.
   ══════════════════════════════════════════════════════════════════════════ */

const ShapeFactory = (() => {
  /* Geometry registry — one entry per shape type */
  const _geometries = new Map([
    ['cube',        () => new THREE.BoxGeometry(0.9, 0.9, 0.9)],
    ['sphere',      () => new THREE.SphereGeometry(0.55, 32, 24)],
    ['tetrahedron', () => new THREE.TetrahedronGeometry(0.72)],
    ['torus',       () => new THREE.TorusGeometry(0.45, 0.18, 16, 64)],
    ['octahedron',  () => new THREE.OctahedronGeometry(0.65)],
    ['dodecahedron',() => new THREE.DodecahedronGeometry(0.55)],
    ['cone',        () => new THREE.ConeGeometry(0.5, 1.0, 6)],
    ['cylinder',    () => new THREE.CylinderGeometry(0.3, 0.5, 1.0, 8)],
  ]);

  const _geoNames = [..._geometries.keys()];

  /* Vibrant palette — distinct, saturated colors */
  const _colors = [
    0xff4d6d, 0xff9f43, 0xfeca57, 0x1dd1a1, 0x54a0ff,
    0xa29bfe, 0xfd79a8, 0x00cec9, 0x6c5ce7, 0xff6b6b,
    0x48dbfb, 0xff9ff3, 0x00b894, 0xfdcb6e, 0xe17055,
    0x74b9ff, 0xd63031, 0x0984e3, 0x00b894, 0xe84393,
  ];

  let _colorIndex = 0;

  function pickColor() {
    // Cycle through palette so consecutive shapes have distinct colors
    const c = _colors[_colorIndex % _colors.length];
    _colorIndex++;
    return c;
  }

  return {
    /**
     * Register a new geometry.
     * @param {string} name
     * @param {Function} factoryFn - () => THREE.BufferGeometry
     */
    register(name, factoryFn) {
      _geometries.set(name, factoryFn);
      _geoNames.push(name);
    },

    /**
     * Create a new Three.js mesh with random geometry, color, intent.
     * @param {string[]} intentNames  - available intents to pick from
     * @param {{ x, y, z }} bounds   - spawn within bounds
     * @returns {{ mesh: THREE.Mesh, intent: string, geoName: string }}
     */
    create(intentNames, bounds) {
      // Random geometry
      const geoName = _geoNames[Math.floor(Math.random() * _geoNames.length)];
      const geometry = _geometries.get(geoName)();

      // Material — slightly transparent, physically-based
      const color = pickColor();
      const material = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.25 + Math.random() * 0.5,
        roughness: 0.2 + Math.random() * 0.4,
        transparent: true,
        opacity: 0.82 + Math.random() * 0.16,
      });

      const mesh = new THREE.Mesh(geometry, material);

      // Random spawn position (inside bounds with a margin)
      mesh.position.set(
        (Math.random() - 0.5) * bounds.x * 0.8,
        (Math.random() - 0.5) * bounds.y * 0.8,
        (Math.random() - 0.5) * bounds.z * 0.6,
      );

      // Random initial rotation
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
      );

      // Random intent
      const intent = intentNames[Math.floor(Math.random() * intentNames.length)];

      // Store metadata on the mesh for the label system
      mesh.userData.intent  = intent;
      mesh.userData.geoName = geoName;

      return { mesh, intent, geoName };
    },
  };
})();


/* COW FACTORY -- createCow(bounds)
   Builds a small, cartoonish "flying cow" easter-egg mesh out of Three.js
   primitives, returned as a THREE.Group. Built at a comfortable working
   scale then shrunk down so it reads as visibly smaller than the regular
   ShapeFactory shapes (which run ~0.5-0.9 units). */

function createCow(bounds) {
  const group = new THREE.Group();

  const white  = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, metalness: 0.05 });
  const pink   = new THREE.MeshStandardMaterial({ color: 0xffb6c9, roughness: 0.5, metalness: 0.05 });
  const black  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.1 });
  const brown  = new THREE.MeshStandardMaterial({ color: 0x4a2f1c, roughness: 0.6, metalness: 0.05 });
  const gold   = new THREE.MeshStandardMaterial({ color: 0xffd23f, roughness: 0.3, metalness: 0.5 });
  const gray   = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4, metalness: 0.1, transparent: true, opacity: 0.85 });

  /* Body -- horizontal oval barrel */
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 2.0, 16), white);
  body.rotation.z = Math.PI / 2;
  body.position.set(0, 0, 0);
  group.add(body);

  /* Head -- oversized sphere at the front of the body */
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.62, 20, 16), white);
  head.position.set(1.35, 0.25, 0);
  group.add(head);

  /* Eyes -- big goofy white spheres with black pupils */
  const eyeOffsets = [-0.32, 0.32];
  eyeOffsets.forEach(zOff => {
    const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), white);
    eyeWhite.position.set(1.75, 0.5, zOff);
    group.add(eyeWhite);

    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8), black);
    pupil.position.set(1.9, 0.53, zOff);
    group.add(pupil);
  });

  /* Ears -- small pink cones on the sides of the head */
  [-1, 1].forEach(side => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 8), pink);
    ear.position.set(1.15, 0.75, side * 0.55);
    ear.rotation.x = side * 0.6;
    group.add(ear);
  });

  /* Snout -- flattened pink sphere on the front of the head */
  const snout = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 10), pink);
  snout.position.set(1.9, 0.1, 0);
  snout.scale.set(0.7, 0.65, 1.0);
  group.add(snout);

  /* Nostrils (tiny black dots on snout) */
  [-0.12, 0.12].forEach(z => {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), black);
    nostril.position.set(2.12, 0.1, z);
    group.add(nostril);
  });

  /* Horns -- two small cones on top of the head */
  [-1, 1].forEach(side => {
    const horn = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.28, 8), gray);
    horn.position.set(1.3, 0.95, side * 0.28);
    horn.rotation.z = -side * 0.35;
    group.add(horn);
  });

  /* Legs -- four stubby cylinders underneath the body */
  const legPositions = [
    [-0.7, -0.95, 0.55], [-0.7, -0.95, -0.55],
    [0.7, -0.95, 0.55],  [0.7, -0.95, -0.55],
  ];
  legPositions.forEach(([x, y, z]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.7, 8), white);
    leg.position.set(x, y, z);
    group.add(leg);

    /* Hooves -- small dark cylinders at the bottom of each leg */
    const hoof = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.18, 8), black);
    hoof.position.set(x, y - 0.44, z);
    group.add(hoof);
  });

  /* Tail -- thin, slightly curved cylinder at the back (tagged for animation) */
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, 0.9, 6), brown);
  tail.name = 'tail';
  tail.position.set(-1.15, -0.15, 0);
  tail.rotation.z = Math.PI / 2.6;
  group.add(tail);

  /* Wings -- tiny comical angel wings, flat boxes on the back/sides */
  [-1, 1].forEach(side => {
    const wing = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.06, 0.5), gray);
    wing.position.set(-0.1, 0.55, side * 0.85);
    wing.rotation.z = side * 0.15;
    wing.rotation.y = side * 0.3;
    group.add(wing);
  });

  /* Spots -- 3-5 flattened dark ovals on the body surface */
  const spotCount = 3 + Math.floor(Math.random() * 3); // 3-5
  for (let i = 0; i < spotCount; i++) {
    const spot = new THREE.Mesh(new THREE.SphereGeometry(0.25 + Math.random() * 0.15, 10, 8), brown);
    const angle = Math.random() * Math.PI * 2;
    const along = (Math.random() - 0.5) * 1.6;
    spot.position.set(along, Math.sin(angle) * 0.75, Math.cos(angle) * 0.75);
    spot.scale.set(0.5, 1, 1);
    spot.lookAt(spot.position.clone().multiplyScalar(2));
    group.add(spot);
  }

  /* Bell -- small golden sphere dangling under the neck with a strap */
  const strap = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.35, 6), brown);
  strap.position.set(1.05, -0.15, 0);
  group.add(strap);

  const bell = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10), gold);
  bell.position.set(1.05, -0.42, 0);
  group.add(bell);

  /* Udders -- pink sphere cluster on the underside of the body */
  const udderOffsets = [[-0.25, -0.25], [0.25, -0.25], [-0.25, 0.25], [0.25, 0.25]];
  udderOffsets.forEach(([x, z]) => {
    const udder = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), pink);
    udder.position.set(x, -0.95, z);
    group.add(udder);
  });

  /* Scale the whole cow down so it reads as noticeably smaller than the
     regular ShapeFactory shapes (which are built at ~0.5-0.9 units). */
  group.scale.set(0.32, 0.32, 0.32);

  return group;
}


/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 4 — MAIN APPLICATION
   ───────────────────────────────────────────────────────────────────────────
   Three.js scene setup, animation loop, UI controls.
   ══════════════════════════════════════════════════════════════════════════ */

(function main() {
  /* ── Scene ────────────────────────────────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const container = document.getElementById('canvas-container');
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  // Very subtle fog for depth
  scene.fog = new THREE.FogExp2(0x000000, 0.018);

  /* ── Camera ───────────────────────────────────────────────────────────── */
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 14);

  /* ── Lights ───────────────────────────────────────────────────────────── */
  // Ambient — soft fill
  const ambient = new THREE.AmbientLight(0xffffff, 0.35);
  scene.add(ambient);

  // Key light — main directional light with shadows
  const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
  keyLight.position.set(6, 8, 5);
  keyLight.castShadow = true;
  scene.add(keyLight);

  // Rim light — colored accent from the opposite side
  const rimLight = new THREE.DirectionalLight(0x88aaff, 0.55);
  rimLight.position.set(-5, -3, -4);
  scene.add(rimLight);

  // Fill light — warm underlight
  const fillLight = new THREE.PointLight(0xff6633, 0.5, 30);
  fillLight.position.set(0, -6, 2);
  scene.add(fillLight);

  /* ── Bounding box ─────────────────────────────────────────────────────── */
  // Half-extents; shapes bounce inside this invisible box
  const BOUNDS = { x: 8, y: 5, z: 5 };

  /* ── Background star field ────────────────────────────────────────────── */
  (function addStars() {
    const count = 600;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 120;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, sizeAttenuation: true });
    scene.add(new THREE.Points(starGeo, starMat));
  })();

  /* ── Intent engine ────────────────────────────────────────────────────── */
  const intentEngine = new IntentEngine();

  /* ── Live shape tracking ──────────────────────────────────────────────── */
  const shapes = [];    // THREE.Mesh[]
  const labels = [];    // { el: HTMLDivElement, mesh: THREE.Mesh }[]
  let showLabels = true;
  let cowClickCount = 0;
  let cowClickThreshold = Math.floor(Math.random() * 5) + 3; // random 3-7 inclusive

  /* ── Label creation ───────────────────────────────────────────────────── */
  function createLabel(mesh) {
    const el = document.createElement('div');
    el.className = 'intent-label';
    el.textContent = mesh.userData.intent;
    document.body.appendChild(el);
    labels.push({ el, mesh });
    el.style.opacity = showLabels ? '1' : '0';
    return el;
  }

  function removeLabel(mesh) {
    const idx = labels.findIndex(l => l.mesh === mesh);
    if (idx !== -1) {
      labels[idx].el.remove();
      labels.splice(idx, 1);
    }
  }

  /** Project a 3D position to 2D screen coords */
  const _v3 = new THREE.Vector3();
  function projectToScreen(mesh) {
    _v3.setFromMatrixPosition(mesh.matrixWorld);
    _v3.project(camera);
    return {
      x: (_v3.x * 0.5 + 0.5) * window.innerWidth,
      y: (-_v3.y * 0.5 + 0.5) * window.innerHeight,
    };
  }

  /* ── Spawn a shape ────────────────────────────────────────────────────── */
  function spawnShape() {
    const intentNames = IntentRegistry.names;

    if (cowClickCount >= cowClickThreshold) {
      // Threshold reached — spawn a flying cow instead of a regular shape
      const group = createCow(BOUNDS);
      group.userData.intent  = 'flying cow';
      group.userData.geoName = 'cow';

      group.position.set(
        (Math.random() - 0.5) * BOUNDS.x * 0.8,
        (Math.random() - 0.5) * BOUNDS.y * 0.8,
        (Math.random() - 0.5) * BOUNDS.z * 0.6,
      );
      group.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
      );

      scene.add(group);
      shapes.push(group);
      intentEngine.assign(group, 'flying cow');
      createLabel(group);

      // Reset the click counter/threshold for the next cow
      cowClickCount = 0;
      cowClickThreshold = Math.floor(Math.random() * 5) + 3;
    } else {
      const { mesh, intent } = ShapeFactory.create(intentNames, BOUNDS);

      scene.add(mesh);
      shapes.push(mesh);
      intentEngine.assign(mesh, intent);
      createLabel(mesh);
    }

    document.getElementById('shape-count').textContent = `Shapes: ${shapes.length}`;
    updateRemoveButton();
  }

  /* ── Remove a shape ──────────────────────────────────────────────────────── */
  function removeShape(mesh) {
    scene.remove(mesh);
    const idx = shapes.indexOf(mesh);
    if (idx !== -1) shapes.splice(idx, 1);
    intentEngine.remove(mesh);
    removeLabel(mesh);
    // Dispose geometry/materials — handle both Mesh and Group
    if (mesh.isGroup) {
      mesh.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      });
    } else {
      mesh.geometry.dispose();
      mesh.material.dispose();
    }
    document.getElementById('shape-count').textContent = 'Shapes: ' + shapes.length;
    updateRemoveButton();
  }

  function updateRemoveButton() {
    document.getElementById('btn-remove').disabled = shapes.length <= 1;
  }

  // Spawn the initial shape
  spawnShape();
  updateRemoveButton();

  /* ── UI ───────────────────────────────────────────────────────────────── */
  document.getElementById('btn-add').addEventListener('click', spawnShape);

  document.getElementById('btn-remove').addEventListener('click', () => {
    if (shapes.length <= 1) return;
    removeShape(shapes[shapes.length - 1]); // LIFO: remove most recently added
  });

  const btnLabels = document.getElementById('btn-labels');
  btnLabels.addEventListener('click', () => {
    showLabels = !showLabels;
    btnLabels.textContent = showLabels ? 'labels on' : 'labels off';
    labels.forEach(l => { l.el.style.opacity = showLabels ? '1' : '0'; });
  });

  /* ── Cursor auto-hide after inactivity ───────────────────────────────── */
  let cursorTimer = null;
  const ui = document.getElementById('ui');

  function resetCursorTimer() {
    document.body.style.cursor = 'default';
    ui.classList.remove('hidden');
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => {
      document.body.style.cursor = 'none';
      ui.classList.add('hidden');
    }, 3500);
  }

  document.addEventListener('mousemove', resetCursorTimer);
  document.addEventListener('touchstart', resetCursorTimer);
  resetCursorTimer();

  /* -- Click-to-delete via raycasting -- */
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('click', (event) => {
    // Don't raycast if click was on UI
    if (event.target !== renderer.domElement) return;

    // Every canvas click counts toward the cow spawn threshold, regardless
    // of whether a shape was actually hit by the raycaster below.
    cowClickCount++;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(shapes, true);

    if (intersects.length > 0) {
      // Don't delete the last shape
      if (shapes.length <= 1) return;
      // Find the root shape (could be a child of a group, e.g. the cow)
      let target = intersects[0].object;
      while (target.parent && !shapes.includes(target)) {
        target = target.parent;
      }
      if (shapes.includes(target)) {
        removeShape(target);
      }
    }
  });

  /* ── Resize handler ───────────────────────────────────────────────────── */
  function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);
  onResize();

  /* ── Animation loop ───────────────────────────────────────────────────── */
  const clock = new THREE.Clock();

  // Slow camera drift for screensaver feel
  let camAngle = 0;

  function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.1); // cap dt to avoid spiral on tab switch

    /* Camera gentle orbit */
    camAngle += dt * 0.04;
    camera.position.x = Math.sin(camAngle) * 1.5;
    camera.position.y = Math.cos(camAngle * 0.7) * 0.8;
    camera.lookAt(0, 0, 0);

    /* Tick intent engine */
    intentEngine.update(shapes, BOUNDS, dt);

    /* Update HTML labels */
    if (showLabels) {
      labels.forEach(({ el, mesh }) => {
        const pos = projectToScreen(mesh);
        el.style.left = pos.x + 'px';
        el.style.top  = (pos.y - 28) + 'px';
      });
    }

    /* Animate fill light color for subtle mood shift */
    fillLight.color.setHSL((Date.now() * 0.0001) % 1, 0.7, 0.4);

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
