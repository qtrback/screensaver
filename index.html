<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Screensaver</title>
  <style>
    /* ── Reset & Layout ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── UI Panel ──────────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #ui.hidden { opacity: 0; pointer-events: none; }

    .ui-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 8px 14px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    #shape-count {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }

    /* Add-shape button */
    #btn-add {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-add:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.1);
    }

    #btn-add:active { transform: scale(0.96); }

    #btn-remove {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-remove:hover:not(:disabled) {
      background: rgba(255, 80, 80, 0.25);
      border-color: rgba(255, 100, 100, 0.6);
      transform: scale(1.1);
    }
    #btn-remove:active:not(:disabled) { transform: scale(0.96); }
    #btn-remove:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* Intent label toggle */
    #btn-labels {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }

    #btn-labels:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    /* ── Intent Labels (CSS2DRenderer not used; we use HTML divs) ───── */
    .intent-label {
      position: fixed;
      pointer-events: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.45);
      border-radius: 6px;
      padding: 2px 6px;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      transition: opacity 0.3s;
    }
    .cow-message {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      padding: 10px 18px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 50;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- UI controls -->
<div id="ui">
  <div class="ui-badge" id="shape-count">Shapes: 1</div>
  <button id="btn-labels">labels on</button>
  <button id="btn-remove" title="Remove shape">&#x2212;</button>
  <button id="btn-add" title="Add shape">+</button>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════════════════════
   SECTION 1 — BALLISTIC PHYSICS HELPERS
   ─────────────────────────────────────────────────────────────────────────────
   Pure billiard-ball physics: straight-line integration, wall reflection, and
   speed clamping. NO steering, NO target-seeking, NO attractors.
   ══════════════════════════════════════════════════════════════════════════════ */

const IntentRegistry = (() => {
  /* ── Physics constants ──────────────────────────────────────────────────── */
  const MAX_SPEED = 1.8;      // world-units / second cap
  const MIN_SPEED = 0.3;      // world-units / second floor — no object settles
  // clamp kept so resolveCollisions (which imports nothing) can share the value
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v)); // eslint-disable-line no-unused-vars

  /** Apply velocity to position — straight-line ballistic integration. */
  function integrate(pos, vel, dt) {
    pos.x += vel.x * dt;
    pos.y += vel.y * dt;
    pos.z += vel.z * dt;
  }

  /** Reflect velocity off the bounding-box walls (angle-of-incidence bounce). */
  function bounce(pos, vel, bounds) {
    ['x', 'y', 'z'].forEach(axis => {
      if (pos[axis] > bounds[axis]) {
        pos[axis] = bounds[axis];
        if (vel[axis] > 0) vel[axis] *= -1;
      } else if (pos[axis] < -bounds[axis]) {
        pos[axis] = -bounds[axis];
        if (vel[axis] < 0) vel[axis] *= -1;
      }
    });
    // Clamp speed after wall bounce so restitution stays floaty
    const spd = Math.sqrt(vel.x ** 2 + vel.y ** 2 + vel.z ** 2);
    if (spd > MAX_SPEED) {
      const s = MAX_SPEED / spd;
      vel.x *= s; vel.y *= s; vel.z *= s;
    }
  }

  /**
   * Enforce the minimum-speed floor on a velocity object.
   * If speed < MIN_SPEED, nudge it back up to MIN_SPEED preserving direction.
   * If essentially zero, give it a gentle random drift.
   */
  function enforceMinSpeed(vel) {
    const spd = Math.sqrt(vel.x ** 2 + vel.y ** 2 + vel.z ** 2);
    if (spd < 0.001) {
      // Essentially zero — give a random drift direction at MIN_SPEED
      const a1 = Math.random() * Math.PI * 2;
      const a2 = (Math.random() - 0.5) * Math.PI;
      vel.x = Math.cos(a1) * Math.cos(a2) * MIN_SPEED;
      vel.y = Math.sin(a2) * MIN_SPEED;
      vel.z = Math.sin(a1) * Math.cos(a2) * MIN_SPEED;
    } else if (spd < MIN_SPEED) {
      const s = MIN_SPEED / spd;
      vel.x *= s; vel.y *= s; vel.z *= s;
    }
  }

  /* ── Public API ─────────────────────────────────────────────────────────── */
  return { integrate, bounce, enforceMinSpeed };
})();


/* ══════════════════════════════════════════════════════════════════════════════
   SECTION 2 — INTENT ENGINE
   ─────────────────────────────────────────────────────────────────────────────
   Manages per-shape state (velocity, label) and ticks pure ballistic motion
   each frame: integrate → bounce → enforceMinSpeed. No behavior dispatch.
   ══════════════════════════════════════════════════════════════════════════════ */

class IntentEngine {
  constructor() {
    /**
     * Map<mesh, { intent: string, state: object }>
     * state holds vel and nothing else — no behavior scratchpad needed.
     */
    this._entries = new Map();
  }

  /**
   * Register a shape with a label string.
   * @param {THREE.Object3D} mesh
   * @param {string} intent  — used only as the on-screen label
   */
  assign(mesh, intent) {
    this._entries.set(mesh, {
      intent,
      state: {
        // Pre-seed velocity so every shape starts moving immediately
        vel: {
          x: (Math.random() - 0.5) * 1.0,
          y: (Math.random() - 0.5) * 1.0,
          z: (Math.random() - 0.5) * 1.0,
        },
      },
    });
  }

  /** Remove a shape from the engine. */
  remove(mesh) {
    this._entries.delete(mesh);
  }

  /** Get the current label string for a mesh. */
  getIntent(mesh) {
    return this._entries.get(mesh)?.intent ?? 'bounce';
  }

  /** Get the mutable state object for a mesh (used by resolveCollisions). */
  getState(mesh) {
    return this._entries.get(mesh)?.state ?? null;
  }

  /**
   * Tick all registered shapes — pure ballistic integration only.
   * @param {THREE.Object3D[]} _allShapes  — unused (kept for call-site compat)
   * @param {{ x, y, z }} bounds           — half-extents
   * @param {number} dt                    — delta time in seconds
   */
  update(_allShapes, bounds, dt) {
    const { integrate, bounce, enforceMinSpeed } = IntentRegistry;

    for (const [mesh, entry] of this._entries) {
      // ── Pure ballistic motion: straight line + wall reflect + speed floor ──
      integrate(mesh.position, entry.state.vel, dt);
      bounce(mesh.position, entry.state.vel, bounds);
      enforceMinSpeed(entry.state.vel);

      // ── Decorative spin — uniform across all shapes ──────────────────────
      const rotSpeed = 0.5;
      mesh.rotation.x += dt * rotSpeed * 0.7;
      mesh.rotation.y += dt * rotSpeed * 1.1;
      mesh.rotation.z += dt * rotSpeed * 0.4;
    }
  }
}


/* ══════════════════════════════════════════════════════════════════════════════
   SECTION 3 — SHAPE FACTORY
   ─────────────────────────────────────────────────────────────────────────────
   Geometry registry: adding a new shape type = one registration line.
   ══════════════════════════════════════════════════════════════════════════════ */

const ShapeFactory = (() => {
  /* Geometry registry — one entry per shape type */
  const _geometries = new Map([
    ['cube',        () => new THREE.BoxGeometry(0.9, 0.9, 0.9)],
    ['sphere',      () => new THREE.SphereGeometry(0.55, 32, 24)],
    ['tetrahedron', () => new THREE.TetrahedronGeometry(0.72)],
    ['torus',       () => new THREE.TorusGeometry(0.45, 0.18, 16, 64)],
    ['octahedron',  () => new THREE.OctahedronGeometry(0.65)],
    ['dodecahedron',() => new THREE.DodecahedronGeometry(0.55)],
    ['cone',        () => new THREE.ConeGeometry(0.5, 1.0, 6)],
    ['cylinder',    () => new THREE.CylinderGeometry(0.3, 0.5, 1.0, 8)],
  ]);

  const _geoNames = [..._geometries.keys()];

  /* Vibrant palette — distinct, saturated colors */
  const _colors = [
    0xff4d6d, 0xff9f43, 0xfeca57, 0x1dd1a1, 0x54a0ff,
    0xa29bfe, 0xfd79a8, 0x00cec9, 0x6c5ce7, 0xff6b6b,
    0x48dbfb, 0xff9ff3, 0x00b894, 0xfdcb6e, 0xe17055,
    0x74b9ff, 0xd63031, 0x0984e3, 0x00b894, 0xe84393,
  ];

  let _colorIndex = 0;

  function pickColor() {
    // Cycle through palette so consecutive shapes have distinct colors
    const c = _colors[_colorIndex % _colors.length];
    _colorIndex++;
    return c;
  }

  return {
    /**
     * Register a new geometry.
     * @param {string} name
     * @param {Function} factoryFn - () => THREE.BufferGeometry
     */
    register(name, factoryFn) {
      _geometries.set(name, factoryFn);
      _geoNames.push(name);
    },

    /**
     * Create a new Three.js mesh with random geometry and color.
     * The label string is the geometry name so labels still render.
     * @param {{ x, y, z }} bounds   - spawn within bounds
     * @returns {{ mesh: THREE.Mesh, intent: string, geoName: string }}
     */
    create(bounds) {
      // Random geometry
      const geoName = _geoNames[Math.floor(Math.random() * _geoNames.length)];
      const geometry = _geometries.get(geoName)();

      // Material — slightly transparent, physically-based
      const color = pickColor();
      const material = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.25 + Math.random() * 0.5,
        roughness: 0.2 + Math.random() * 0.4,
        transparent: true,
        opacity: 0.82 + Math.random() * 0.16,
      });

      const mesh = new THREE.Mesh(geometry, material);

      // Random spawn position (inside bounds with a margin)
      mesh.position.set(
        (Math.random() - 0.5) * bounds.x * 0.8,
        (Math.random() - 0.5) * bounds.y * 0.8,
        (Math.random() - 0.5) * bounds.z * 0.6,
      );

      // Random initial rotation
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
      );

      // Use geometry name as the descriptive label (no behavior driving motion)
      const intent = geoName;

      // Store metadata on the mesh for the label system
      mesh.userData.intent  = intent;
      mesh.userData.geoName = geoName;

      return { mesh, intent, geoName };
    },
  };
})();


/* COW FACTORY -- createCow(bounds)
   Builds a small, cartoonish "flying cow" easter-egg mesh out of Three.js
   primitives, returned as a THREE.Group. Built at a comfortable working
   scale then shrunk down so it reads as visibly smaller than the regular
   ShapeFactory shapes (which run ~0.5-0.9 units). */

function createCow(bounds) {
  const group = new THREE.Group();

  const white  = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, metalness: 0.05 });
  const pink   = new THREE.MeshStandardMaterial({ color: 0xffb6c9, roughness: 0.5, metalness: 0.05 });
  const black  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.1 });
  const brown  = new THREE.MeshStandardMaterial({ color: 0x4a2f1c, roughness: 0.6, metalness: 0.05 });
  const gold   = new THREE.MeshStandardMaterial({ color: 0xffd23f, roughness: 0.3, metalness: 0.5 });
  const gray   = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4, metalness: 0.1, transparent: true, opacity: 0.85 });

  /* Body -- horizontal oval barrel */
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 2.0, 16), white);
  body.rotation.z = Math.PI / 2;
  body.position.set(0, 0, 0);
  group.add(body);

  /* Head -- oversized sphere at the front of the body */
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.62, 20, 16), white);
  head.position.set(1.35, 0.25, 0);
  group.add(head);

  /* Eyes -- big goofy white spheres with black pupils */
  const eyeOffsets = [-0.32, 0.32];
  eyeOffsets.forEach(zOff => {
    const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), white);
    eyeWhite.position.set(1.75, 0.5, zOff);
    group.add(eyeWhite);

    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8), black);
    pupil.position.set(1.9, 0.53, zOff);
    group.add(pupil);
  });

  /* Ears -- small pink cones on the sides of the head */
  [-1, 1].forEach(side => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 8), pink);
    ear.position.set(1.15, 0.75, side * 0.55);
    ear.rotation.x = side * 0.6;
    group.add(ear);
  });

  /* Snout -- flattened pink sphere on the front of the head */
  const snout = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 10), pink);
  snout.position.set(1.9, 0.1, 0);
  snout.scale.set(0.7, 0.65, 1.0);
  group.add(snout);

  /* Nostrils (tiny black dots on snout) */
  [-0.12, 0.12].forEach(z => {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), black);
    nostril.position.set(2.12, 0.1, z);
    group.add(nostril);
  });

  /* Horns -- two small cones on top of the head */
  [-1, 1].forEach(side => {
    const horn = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.28, 8), gray);
    horn.position.set(1.3, 0.95, side * 0.28);
    horn.rotation.z = -side * 0.35;
    group.add(horn);
  });

  /* Legs -- four stubby cylinders underneath the body */
  const legPositions = [
    [-0.7, -0.95, 0.55], [-0.7, -0.95, -0.55],
    [0.7, -0.95, 0.55],  [0.7, -0.95, -0.55],
  ];
  legPositions.forEach(([x, y, z]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.7, 8), white);
    leg.position.set(x, y, z);
    group.add(leg);

    /* Hooves -- small dark cylinders at the bottom of each leg */
    const hoof = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.18, 8), black);
    hoof.position.set(x, y - 0.44, z);
    group.add(hoof);
  });

  /* Tail -- thin, slightly curved cylinder at the back (tagged for animation) */
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, 0.9, 6), brown);
  tail.name = 'tail';
  tail.position.set(-1.15, -0.15, 0);
  tail.rotation.z = Math.PI / 2.6;
  group.add(tail);

  /* Wings -- tiny comical angel wings, flat boxes on the back/sides */
  [-1, 1].forEach(side => {
    const wing = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.06, 0.5), gray);
    wing.position.set(-0.1, 0.55, side * 0.85);
    wing.rotation.z = side * 0.15;
    wing.rotation.y = side * 0.3;
    group.add(wing);
  });

  /* Spots -- 3-5 flattened dark ovals on the body surface */
  const spotCount = 3 + Math.floor(Math.random() * 3); // 3-5
  for (let i = 0; i < spotCount; i++) {
    const spot = new THREE.Mesh(new THREE.SphereGeometry(0.25 + Math.random() * 0.15, 10, 8), brown);
    const angle = Math.random() * Math.PI * 2;
    const along = (Math.random() - 0.5) * 1.6;
    spot.position.set(along, Math.sin(angle) * 0.75, Math.cos(angle) * 0.75);
    spot.scale.set(0.5, 1, 1);
    spot.lookAt(spot.position.clone().multiplyScalar(2));
    group.add(spot);
  }

  /* Bell -- small golden sphere dangling under the neck with a strap */
  const strap = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.35, 6), brown);
  strap.position.set(1.05, -0.15, 0);
  group.add(strap);

  const bell = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10), gold);
  bell.position.set(1.05, -0.42, 0);
  group.add(bell);

  /* Udders -- pink sphere cluster on the underside of the body */
  const udderOffsets = [[-0.25, -0.25], [0.25, -0.25], [-0.25, 0.25], [0.25, 0.25]];
  udderOffsets.forEach(([x, z]) => {
    const udder = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), pink);
    udder.position.set(x, -0.95, z);
    group.add(udder);
  });

  /* Scale the whole cow down so it reads as noticeably smaller than the
     regular ShapeFactory shapes (which are built at ~0.5-0.9 units). */
  group.scale.set(0.32, 0.32, 0.32);

  return group;
}


/* ══════════════════════════════════════════════════════════════════════════════
   SECTION 4 — MAIN APPLICATION
   ─────────────────────────────────────────────────────────────────────────────
   Three.js scene setup, animation loop, UI controls.
   ══════════════════════════════════════════════════════════════════════════════ */

(function main() {
  /* ── Scene ──────────────────────────────────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const container = document.getElementById('canvas-container');
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  // Very subtle fog for depth
  scene.fog = new THREE.FogExp2(0x000000, 0.018);

  /* ── Camera ─────────────────────────────────────────────────────────────── */
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 14);

  /* ── Lights ─────────────────────────────────────────────────────────────── */
  // Ambient — soft fill
  const ambient = new THREE.AmbientLight(0xffffff, 0.35);
  scene.add(ambient);

  // Key light — main directional light with shadows
  const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
  keyLight.position.set(6, 8, 5);
  keyLight.castShadow = true;
  scene.add(keyLight);

  // Rim light — colored accent from the opposite side
  const rimLight = new THREE.DirectionalLight(0x88aaff, 0.55);
  rimLight.position.set(-5, -3, -4);
  scene.add(rimLight);

  // Fill light — warm underlight
  const fillLight = new THREE.PointLight(0xff6633, 0.5, 30);
  fillLight.position.set(0, -6, 2);
  scene.add(fillLight);

  /* ── Bounding box ───────────────────────────────────────────────────────── */
  // Half-extents; shapes bounce inside this invisible box
  const BOUNDS = { x: 8, y: 5, z: 5 };

  /* ── Background star field ──────────────────────────────────────────────── */
  (function addStars() {
    const count = 600;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 120;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, sizeAttenuation: true });
    scene.add(new THREE.Points(starGeo, starMat));
  })();

  /* ── Intent engine ──────────────────────────────────────────────────────── */
  const intentEngine = new IntentEngine();

  /* ── Live shape tracking ────────────────────────────────────────────────── */
  const shapes = [];    // THREE.Object3D[]
  const labels = [];    // { el: HTMLDivElement, mesh: THREE.Object3D }[]
  const MAX_SHAPES = 12;
  const COW_CHANCE = 0.12;   // ~1 in 8 chance the cow spawns on any Add
  const COLLISION_RADIUS = 0.6;
  let showLabels = true;

  /* ── Label creation ─────────────────────────────────────────────────────── */
  function createLabel(mesh) {
    const el = document.createElement('div');
    el.className = 'intent-label';
    el.textContent = mesh.userData.intent;
    document.body.appendChild(el);
    labels.push({ el, mesh });
    el.style.opacity = showLabels ? '1' : '0';
    return el;
  }

  function removeLabel(mesh) {
    const idx = labels.findIndex(l => l.mesh === mesh);
    if (idx !== -1) {
      labels[idx].el.remove();
      labels.splice(idx, 1);
    }
  }

  /** Project a 3D position to 2D screen coords */
  const _v3 = new THREE.Vector3();
  function projectToScreen(mesh) {
    _v3.setFromMatrixPosition(mesh.matrixWorld);
    _v3.project(camera);
    return {
      x: (_v3.x * 0.5 + 0.5) * window.innerWidth,
      y: (-_v3.y * 0.5 + 0.5) * window.innerHeight,
    };
  }

  function cowActive() {
    return shapes.some(s => s.userData && s.userData.geoName === 'cow');
  }

  function updateShapeCount() {
    document.getElementById('shape-count').textContent = `Shapes: ${shapes.length}`;
  }

  function updateAddButton() {
    document.getElementById('btn-add').disabled = shapes.length >= MAX_SHAPES;
  }

  /* ── Spawn a shape ──────────────────────────────────────────────────────── */
  function spawnShape() {
    if (shapes.length >= MAX_SHAPES) return;

    // The cow is a rare surprise: on every Add there's a small random chance
    // it appears instead of a normal shape — eligible at any count (even the
    // first), never guaranteed, at most one at a time.
    if (!cowActive() && Math.random() < COW_CHANCE) {
      spawnCow();
      return;
    }

    const { mesh, intent } = ShapeFactory.create(BOUNDS);

    scene.add(mesh);
    shapes.push(mesh);
    intentEngine.assign(mesh, intent);
    createLabel(mesh);

    updateShapeCount();
    updateRemoveButton();
    updateAddButton();
  }

  function spawnCow() {
    if (shapes.length >= MAX_SHAPES || cowActive()) return;

    const group = createCow(BOUNDS);
    group.userData.intent  = 'cow';
    group.userData.geoName = 'cow';

    group.position.set(
      (Math.random() - 0.5) * BOUNDS.x * 0.8,
      (Math.random() - 0.5) * BOUNDS.y * 0.8,
      (Math.random() - 0.5) * BOUNDS.z * 0.6,
    );
    group.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
    );

    scene.add(group);
    shapes.push(group);
    intentEngine.assign(group, 'cow');
    createLabel(group);
    showCowMessage();

    updateShapeCount();
    updateRemoveButton();
    updateAddButton();
  }

  function showCowMessage() {
    const el = document.createElement('div');
    el.className = 'cow-message';
    el.textContent = 'You found a cow in space! 🐄';
    document.body.appendChild(el);
    // fade in
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    // fade out and remove after a few seconds
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 400);
    }, 3200);
  }

  /* ── Remove a shape ─────────────────────────────────────────────────────── */
  function removeShape(mesh) {
    scene.remove(mesh);
    const idx = shapes.indexOf(mesh);
    if (idx !== -1) shapes.splice(idx, 1);
    intentEngine.remove(mesh);
    removeLabel(mesh);
    // Dispose geometry/materials — handle both Mesh and Group
    if (mesh.isGroup) {
      mesh.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      });
    } else {
      mesh.geometry.dispose();
      mesh.material.dispose();
    }
    updateShapeCount();
    updateRemoveButton();
    updateAddButton();
  }

  function updateRemoveButton() {
    document.getElementById('btn-remove').disabled = shapes.length <= 1;
  }

  // Spawn the initial shape
  spawnShape();
  updateRemoveButton();
  updateAddButton();

  /* ── UI ─────────────────────────────────────────────────────────────────── */
  document.getElementById('btn-add').addEventListener('click', spawnShape);

  document.getElementById('btn-remove').addEventListener('click', () => {
    if (shapes.length <= 1) return;
    removeShape(shapes[shapes.length - 1]); // LIFO: remove most recently added
  });

  const btnLabels = document.getElementById('btn-labels');
  btnLabels.addEventListener('click', () => {
    showLabels = !showLabels;
    btnLabels.textContent = showLabels ? 'labels on' : 'labels off';
    labels.forEach(l => { l.el.style.opacity = showLabels ? '1' : '0'; });
  });

  /* ── Cursor auto-hide after inactivity ──────────────────────────────────── */
  let cursorTimer = null;
  const ui = document.getElementById('ui');

  function resetCursorTimer() {
    document.body.style.cursor = 'default';
    ui.classList.remove('hidden');
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => {
      document.body.style.cursor = 'none';
      ui.classList.add('hidden');
    }, 3500);
  }

  document.addEventListener('mousemove', resetCursorTimer);
  document.addEventListener('touchstart', resetCursorTimer);
  resetCursorTimer();

  /* -- Click-to-delete via raycasting -- */
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('click', (event) => {
    // Don't raycast if click was on UI
    if (event.target !== renderer.domElement) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(shapes, true);

    if (intersects.length > 0 && shapes.length > 1) {
      // Find the root shape (could be a child of a group, e.g. the cow)
      let target = intersects[0].object;
      while (target.parent && !shapes.includes(target)) {
        target = target.parent;
      }
      if (shapes.includes(target)) {
        removeShape(target);
      }
    }
    // Empty-space click does nothing
  });

  function resolveCollisions() {
    const minDistance = COLLISION_RADIUS * 2;
    const minDistanceSq = minDistance * minDistance;
    const EPSILON = 0.0001;
    // Restitution: extra outward impulse so bounces read visually even at slow speeds.
    // After velocity exchange, each object gains this much additional outward normal speed.
    const RESTITUTION_BONUS = 0.35; // world-units/sec added along normal per object
    const MIN_SPEED = 0.3; // imported constant (same as in behaviors)

    for (let i = 0; i < shapes.length; i++) {
      const a = shapes[i];
      const aState = intentEngine.getState(a);
      if (!aState || !aState.vel) continue;

      for (let j = i + 1; j < shapes.length; j++) {
        const b = shapes[j];
        const bState = intentEngine.getState(b);
        if (!bState || !bState.vel) continue;

        let nx = b.position.x - a.position.x;
        let ny = b.position.y - a.position.y;
        let nz = b.position.z - a.position.z;
        let distSq = nx * nx + ny * ny + nz * nz;

        if (distSq >= minDistanceSq) continue;

        let dist = Math.sqrt(distSq);
        if (dist < EPSILON) {
          const angle = Math.random() * Math.PI * 2;
          nx = Math.cos(angle);
          ny = (Math.random() - 0.5) * 0.5;
          nz = Math.sin(angle);
          dist = Math.sqrt(nx * nx + ny * ny + nz * nz);
        }

        nx /= dist;
        ny /= dist;
        nz /= dist;

        // Positional push-apart so objects don't overlap
        const overlap = minDistance - Math.max(dist, EPSILON);
        const push = overlap * 0.5;
        a.position.x -= nx * push;
        a.position.y -= ny * push;
        a.position.z -= nz * push;
        b.position.x += nx * push;
        b.position.y += ny * push;
        b.position.z += nz * push;

        const relVelX = bState.vel.x - aState.vel.x;
        const relVelY = bState.vel.y - aState.vel.y;
        const relVelZ = bState.vel.z - aState.vel.z;
        const relNormalSpeed = relVelX * nx + relVelY * ny + relVelZ * nz;

        if (relNormalSpeed < 0) {
          // Elastic normal-velocity exchange
          const aNormal = aState.vel.x * nx + aState.vel.y * ny + aState.vel.z * nz;
          const bNormal = bState.vel.x * nx + bState.vel.y * ny + bState.vel.z * nz;
          const normalDelta = bNormal - aNormal;

          aState.vel.x += normalDelta * nx;
          aState.vel.y += normalDelta * ny;
          aState.vel.z += normalDelta * nz;
          bState.vel.x -= normalDelta * nx;
          bState.vel.y -= normalDelta * ny;
          bState.vel.z -= normalDelta * nz;

          // Restitution bonus: push both objects apart along the normal so the
          // bounce reads visually at slow screensaver speeds.
          // a moves in -normal direction, b moves in +normal direction.
          aState.vel.x -= nx * RESTITUTION_BONUS;
          aState.vel.y -= ny * RESTITUTION_BONUS;
          aState.vel.z -= nz * RESTITUTION_BONUS;
          bState.vel.x += nx * RESTITUTION_BONUS;
          bState.vel.y += ny * RESTITUTION_BONUS;
          bState.vel.z += nz * RESTITUTION_BONUS;

          // Ensure each object has at least MIN_SPEED of outward normal velocity
          // (so the bounce reads, not mushy) then clamp to MAX_SPEED.
          const clampSpeed = (vel) => {
            const spd = Math.sqrt(vel.x ** 2 + vel.y ** 2 + vel.z ** 2);
            if (spd > 1.8) { // MAX_SPEED = 1.8
              const s = 1.8 / spd;
              vel.x *= s; vel.y *= s; vel.z *= s;
            } else if (spd < MIN_SPEED && spd > 0.001) {
              const s = MIN_SPEED / spd;
              vel.x *= s; vel.y *= s; vel.z *= s;
            }
          };
          clampSpeed(aState.vel);
          clampSpeed(bState.vel);
        }
      }
    }
  }

  /* ── Resize handler ─────────────────────────────────────────────────────── */
  function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);
  onResize();

  /* ── Animation loop ─────────────────────────────────────────────────────── */
  const clock = new THREE.Clock();

  // Slow camera drift for screensaver feel
  let camAngle = 0;

  function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.1); // cap dt to avoid spiral on tab switch

    /* Camera gentle orbit */
    camAngle += dt * 0.04;
    camera.position.x = Math.sin(camAngle) * 1.5;
    camera.position.y = Math.cos(camAngle * 0.7) * 0.8;
    camera.lookAt(0, 0, 0);

    /* Tick intent engine — pure ballistic integration */
    intentEngine.update(shapes, BOUNDS, dt);
    resolveCollisions();

    /* Update HTML labels */
    if (showLabels) {
      labels.forEach(({ el, mesh }) => {
        const pos = projectToScreen(mesh);
        el.style.left = pos.x + 'px';
        el.style.top  = (pos.y - 28) + 'px';
      });
    }

    /* Animate fill light color for subtle mood shift */
    fillLight.color.setHSL((Date.now() * 0.0001) % 1, 0.7, 0.4);

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
